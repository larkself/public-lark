name: Derive Features

on:
  workflow_dispatch:
    inputs:
      dates:
        description: "日期: YYYYMMDD 或 YYYYMMDD~YYYYMMDD, 多个逗号分隔, 留空=当天"
        required: false
        type: string
      force:
        description: "强制提取 (已存在也重新提取)"
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"
  SHARD_SIZE: "25"

jobs:
  # ── 1. 展开日期 → 过滤交易日 → 拆分分片 ──
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      shards: ${{ steps.shard.outputs.shards }}
      has_work: ${{ steps.shard.outputs.has_work }}
    steps:
      - name: Parse dates
        id: dates
        run: |
          INPUT="${{ inputs.dates }}"
          if [ -z "$INPUT" ]; then
            INPUT=$(TZ=Asia/Shanghai date +%Y%m%d)
          fi

          DATES=""
          IFS=',' read -ra PARTS <<< "$INPUT"
          for part in "${PARTS[@]}"; do
            part=$(echo "$part" | xargs)
            if [[ "$part" == *"~"* ]]; then
              START=$(echo "$part" | cut -d'~' -f1)
              END=$(echo "$part" | cut -d'~' -f2)
              CUR="$START"
              while [[ "$CUR" -le "$END" ]]; do
                DATES="${DATES:+$DATES,}$CUR"
                CUR=$(date -d "${CUR:0:4}-${CUR:4:2}-${CUR:6:2} + 1 day" +%Y%m%d)
              done
            else
              DATES="${DATES:+$DATES,}$part"
            fi
          done

          echo "all=$DATES" >> "$GITHUB_OUTPUT"
          echo "📅 展开日期: $DATES"

      - name: Checkout stock-grabber (trade_date.json)
        uses: actions/checkout@v4
        with:
          repository: hiyishui/stock-grabber
          token: ${{ secrets.GRABBER_PAT }}
          ref: main
          path: stock-grabber
          sparse-checkout: data/trade_date.json

      - name: Check existing derived
        id: existing
        if: inputs.force != true
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            "https://x-access-token:${{ secrets.LARKSELF_PAT }}@github.com/larkself/gp-features.git" \
            .work/gp-features
          cd .work/gp-features
          git sparse-checkout set derived/
          # 提取已有 derived 日期 (YYYY/market_structure_YYYYMMDD.parquet)
          EXISTING=$(find derived/ -name "market_structure_*.parquet" 2>/dev/null \
            | sed 's/.*market_structure_//' | sed 's/\.parquet//' \
            | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "dates=$EXISTING" >> "$GITHUB_OUTPUT"
          echo "📦 已存在: $EXISTING"

      - name: Build shard matrix
        id: shard
        shell: python3 {0}
        env:
          ALL_DATES: ${{ steps.dates.outputs.all }}
          EXISTING_DATES: ${{ steps.existing.outputs.dates }}
          FORCE: ${{ inputs.force }}
          SHARD_SIZE_ENV: ${{ env.SHARD_SIZE }}
        run: |
          import json, os, sys

          all_str = os.environ.get("ALL_DATES", "")
          existing_str = os.environ.get("EXISTING_DATES", "")
          force = os.environ.get("FORCE", "false") == "true"
          shard_size = int(os.environ.get("SHARD_SIZE_ENV", "25"))
          gh_output = os.environ["GITHUB_OUTPUT"]

          # Load trade dates
          with open("stock-grabber/data/trade_date.json") as f:
              td = json.load(f)
          trade_set = set(d.replace("-", "") for d in td["trade_dates"])

          # Filter to valid trade dates
          all_dates = [d.strip() for d in all_str.split(",") if d.strip()]
          valid = sorted(d for d in all_dates if d in trade_set)

          # Skip already-existing
          if not force and existing_str:
              existing = set(existing_str.split(","))
              before = len(valid)
              valid = [d for d in valid if d not in existing]
              print(f"⏭️ 跳过 {before - len(valid)} 已存在日期")

          if not valid:
              print("⏭️ 无待处理日期")
              with open(gh_output, "a") as f:
                  f.write("has_work=false\n")
                  f.write("shards=[]\n")
              sys.exit(0)

          # Split into shards
          shards = []
          for i in range(0, len(valid), shard_size):
              chunk = valid[i : i + shard_size]
              shards.append({"dates": ",".join(chunk), "id": len(shards)})

          matrix = json.dumps(shards)
          print(f"📅 {len(valid)} 交易日 → {len(shards)} 分片")
          with open(gh_output, "a") as f:
              f.write("has_work=true\n")
              f.write(f"shards={matrix}\n")

  # ── 2. 并行派生 (每个分片批量处理 ~25 天) ──
  derive:
    needs: prepare
    if: needs.prepare.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.shards) }}
      fail-fast: false
    steps:
      - name: Checkout stock-grabber
        uses: actions/checkout@v4
        with:
          repository: hiyishui/stock-grabber
          token: ${{ secrets.GRABBER_PAT }}
          ref: main
          path: stock-grabber
          sparse-checkout: |
            data/trade_date.json
            hicccx999

      - name: Clone gp-features (base parquets only)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            "https://x-access-token:${{ secrets.LARKSELF_PAT }}@github.com/larkself/gp-features.git" \
            .work/gp-features
          cd .work/gp-features
          git sparse-checkout set base/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install numpy pandas pyarrow

      - name: Derive features (batch)
        run: |
          echo "🔄 分片 ${{ matrix.shard.id }}: ${{ matrix.shard.dates }}"
          python3 stock-grabber/hicccx999/derive_features.py \
            --target-dates "${{ matrix.shard.dates }}" \
            --base-dir .work/gp-features/base \
            --output-dir .work/derived \
            --trade-date-json stock-grabber/data/trade_date.json

      - name: Upload derived parquets
        uses: actions/upload-artifact@v4
        with:
          name: derived-shard-${{ matrix.shard.id }}
          path: .work/derived/
          retention-days: 1
          compression-level: 0

  # ── 3. 按年份推送到 derive-{year} 仓库 ──
  push:
    needs: [prepare, derive]
    if: needs.prepare.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all derived artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: derived-shard-*
          merge-multiple: true
          path: .work/artifacts

      - name: Push to derive-{year} repos
        env:
          GH_TOKEN: ${{ secrets.LARKSELF_PAT }}
        run: |
          cd .work/artifacts
          for year_dir in */; do
            [ -d "$year_dir" ] || continue
            YEAR="${year_dir%/}"
            REPO="derive-${YEAR}"
            REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/larkself/${REPO}.git"

            echo "📦 处理 ${YEAR} ..."

            # 检查仓库是否存在，不存在则创建
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/larkself/${REPO}")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "🆕 创建仓库 larkself/${REPO}"
              curl -sf -X POST \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/user/repos" \
                -d "{\"name\":\"${REPO}\",\"private\":true,\"auto_init\":true}"
              sleep 3
            fi

            # 克隆仓库
            git clone --depth 1 "${REPO_URL}" "../repo-${YEAR}"

            # 复制文件 (保持 derived/{YYYY}/ 结构)
            mkdir -p "../repo-${YEAR}/derived/${YEAR}"
            cp "${year_dir}"*.parquet "../repo-${YEAR}/derived/${YEAR}/"

            # 提交并推送
            cd "../repo-${YEAR}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add derived/
            if git diff --cached --quiet; then
              echo "ℹ️ ${REPO} 无变更"
            else
              git commit -m "derived: batch update ${YEAR}"
              for TRY in 1 2 3 4 5; do
                git pull --rebase 2>/dev/null || true
                if git push; then
                  echo "✅ ${REPO} 推送成功"
                  break
                fi
                echo "⚠️ push 失败, 重试 (${TRY}/5)"
                sleep $((TRY * 3))
              done
            fi
            cd ../artifacts
          done
